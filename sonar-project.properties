sonar.projectKey=eventflow-asistido-ai
sonar.projectName=Eventflow Asistido AI

sonar.host.url=${env.SONAR_HOST_URL}
sonar.token=${env.SONAR_TOKEN}
sonar.projectVersion=1.0.0

sonar.sources=src
sonar.tests=src

sonar.sourceEncoding=UTF-8

sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/*.spec.ts,**/*.test.ts,**/*.d.ts,**/main.ts,**/environments/**,**/version.ts
sonar.test.inclusions=**/*.spec.ts,**/*.test.ts

sonar.coverage.exclusions=**/main.ts,**/environments/**,**/version.ts,**/*.spec.ts,**/*.test.ts

sonar.typescript.tsconfigPath=tsconfig.app.json

sonar.javascript.lcov.reportPaths=coverage/eventflow-asistido-ai/lcov.info
